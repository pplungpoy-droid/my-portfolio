<!DOCTYPE html>
<html lang="th">


    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - เจ้าพายุ ลุงปอย</title>

    <style>
        body {
            background-color: #f4f8fc;
            font-family: Arial, sans-serif;
            text-align: center;
            color: #333;
            margin: 0;
            padding: 20px;
            line-height: 1.8;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        h1, h2, h3 {
            color: #0077cc;
        }

        img {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 10px;
        }

        .profile-img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 50%;
        }

        .quote {
            background: #eef7ff;
            padding: 15px;
            border-left: 5px solid #0077cc;
            border-radius: 5px;
            margin: 15px 0;
        }

        ul {
            text-align: left;
            display: inline-block;
        }

        .section {
            margin-bottom: 40px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>สวัสดี ยินดีต้อนรับสู่พอร์ตของฉัน</h1>

    <img class="profile-img"
         src="https://i.pinimg.com/1200x/87/74/8f/87748f16c63d66482143b3bbf6373298.jpg"
         alt="Profile">

    <!-- เนื้อหาที่เหลือของ Portfolio ใส่ต่อจากตรงนี้ -->

</div>

</body>
</html>
